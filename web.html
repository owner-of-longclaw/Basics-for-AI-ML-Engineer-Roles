<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detection AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Using a high-quality AI/Tech background image */
            background-image: url('https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        /* This container makes your content stand out against the background */
        .container {
            background-color: rgba(0, 0, 0, 0.7); /* Dark semi-transparent box */
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 700px;
            backdrop-filter: blur(10px); /* Adds a modern 'glass' blur effect */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #00d4ff; /* Techy blue color */
            margin-bottom: 20px;
        }

        ol {
            text-align: left;
            display: inline-block;
            line-height: 1.8;
        }

        li::marker {
            color: #00d4ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Phishing Detection AI</h1>
        <p>The system is analyzing the content for potential threats:</p>

        <ol>
            <li>Scanning for suspicious sender metadata.</li>
            <li>Analyzing text intent using NLP models.</li>
            <li>Checking URLs against real-time threat intelligence.</li>
            <li>Calculating final probability score.</li>
        </ol>
    </div>

</body>
</html>
